<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101411">
    <title>凡尔登：沃堡守备战</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="gameShell" aria-label="凡尔登：沃堡守备战试玩版">
      <canvas id="game" aria-label="沃堡战场。桌面端点击画面锁定鼠标并转动视角；移动端在画面右侧滑动瞄准。"></canvas>

      <div id="guide" role="status"><b>行动指引</b><span id="guideText">向金色目标标记移动。</span></div>

      <section id="hud" aria-label="战斗信息">
        <div class="hud-top">
          <div class="brand"><span>VERDUN</span><strong>沃堡守备战</strong></div>
          <div class="objective"><span>目标</span><strong id="objectiveText">夺回 · 弹药库</strong><i><b id="captureFill"></b></i></div>
          <div class="hud-actions"><button id="weaponButton" class="view-button" type="button">武器库</button><button id="viewButton" class="view-button" type="button" aria-label="切换视角">第一人称</button></div>
        </div>
        <div class="hud-bottom">
          <div class="vital"><img class="portrait" src="assets/french-poilu.png" alt="1916 年法军步兵"><span>生命</span><div><b id="healthFill"></b></div><strong id="healthText">100</strong></div>
          <div class="ammo"><span id="weaponName">勒贝尔步枪</span><strong><b id="ammoText">5</b> <em>/ <i id="reserveText">25</i></em></strong><small id="reloadState">可射击</small><small id="weaponStats">5 发 · 190 发/分</small></div>
          <div class="status" id="statusText">雨水敲击着沃堡的石墙。</div>
        </div>
      </section>

      <div id="crosshair" aria-hidden="true"></div>
      <div id="pitchMeter" aria-label="瞄准仰角"><i id="pitchNeedle"></i><span>仰角</span></div>
      <div id="hitFlash" aria-hidden="true"></div>
      <div id="damageArrow" aria-hidden="true"></div>

      <section id="weaponPanel" class="weapon-panel is-hidden" aria-label="选择武器">
        <div><p class="eyebrow">携行武器</p><strong>选择主武器</strong><button id="closeWeapons" type="button" aria-label="关闭武器库">×</button></div>
        <button data-weapon="lebel" class="weapon-choice is-selected" type="button"><b>勒贝尔 M1886</b><span>5 发弹仓 · 190 发/分 · 高伤害</span></button>
        <button data-weapon="chauchat" class="weapon-choice" type="button"><b>绍沙轻机枪</b><span>20 发弹匣 · 420 发/分 · 压制火力</span></button>
        <button data-weapon="carbine" class="weapon-choice" type="button"><b>贝蒂埃卡宾枪</b><span>8 发弹仓 · 330 发/分 · 均衡</span></button>
      </section>

      <section id="touchControls" aria-label="触摸控制">
        <div id="joystick" class="joystick" role="application" aria-label="移动摇杆"><i id="stick"></i></div>
        <button id="fireButton" class="fire" type="button">射击</button>
        <button id="reloadButton" class="reload" type="button">装填</button>
      </section>

      <section id="intro" class="overlay">
        <div class="intro-card">
          <p class="eyebrow">1916 · 凡尔登</p>
          <h1>沃堡守备战</h1>
          <p>暴雨后的堡垒甬道已被敌军渗透。夺回弹药库、肃清西侧甬道，再守住最后一道铁门。</p>
          <div class="missions"><b>01 夺回弹药库</b><b>02 肃清西侧甬道</b><b>03 守住铁门</b></div>
          <div class="brief"><span>移动</span><b>WASD / 左侧摇杆</b><span>瞄准与射击</span><b>鼠标转向 + 左键 / 右侧滑动 + 射击<br>J / L 微调左右，Q / E 微调仰角</b></div>
          <button id="startButton" type="button">进入沃堡</button>
        </div>
      </section>

      <section id="end" class="overlay is-hidden" aria-live="polite">
        <div class="intro-card">
          <p class="eyebrow" id="endKicker">任务结束</p>
          <h1 id="endTitle">沃堡得以守住</h1>
          <p id="endText"></p>
          <button id="restartButton" type="button">重新部署</button>
        </div>
      </section>
    </main>
    <script type="module" src="game3d.js"></script>
  </body>
</html>
